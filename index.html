<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title & logo -->
    <title>Login | Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style/style.css">
</head>
<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center py-5">
        <div class="bg-white border border-gray-200 rounded-xl shadow-xl w-full h-full  md:w-[26%] space-y-6">
            <div class="flex justify-center mt-5">
                <img src="./assets/github-logo.png" alt="">
            </div>
            <div class="text-center">
                <h2 class="font-bold text-2xl text-[#1F2937]">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
            <div class="flex justify-center">
                <form class="fieldset w-full p-6">
                    <fieldset class="fieldset">
                      <label class="label font-bold text-[#1F2937] text-sm">Username</label>
                      <input id="username" type="text" class="input validator w-full" placeholder="Enter Username" required />
                      <p class="validator-hint hidden">Required</p>
                      <p class="text-[#4A00FF]">Default: admin</p>
                    </fieldset>
                
                    <label class="fieldset">
                      <span class="label font-bold text-[#1F2937] text-sm">Password</span>
                      <input id="password" type="password" class="input validator w-full" placeholder="Enter Password" required />
                      <span class="validator-hint hidden">Required</span>
                      <p class="text-[#4A00FF]">Default: admin123</p>
                    </label>
                
                    <button id="btn-login" class="btn btn-primary mt-4 w-full" type="button">Sign In</button>
                    <div class="divider">OR</div>
                    <p class="text-sm text-center text-[#64748B] mb-2">Demo Credentials</p>
                    <div class="p-6 bg-[#F8FAFC] w-full text-center rounded-xl">
                        <p><b>Username:</b> admin</p>
                        <p><b>Password:</b> admin123</p>
                    </div>
                </form>
            </div>
        </div>
        
        <script src="./script/script.js"></script>
</body>
</html>
