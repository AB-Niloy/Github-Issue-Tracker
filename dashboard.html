<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title & logo -->
    <title>Login | Github Issue Tracker</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- Tailwind & DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#F8FAFC]">

    <header class="navbar bg-[#FFFFFF] shadow-sm">
        <div class="flex-1 flex items-center gap-2 px-8">
            <img src="./assets/github-logo.png" class="w-8" alt="">
            <a class="text-xl font-semibold">GitHub Issues Tracker</a>
        </div>
        <div class="flex gap-2 px-8">
            <input type="text" placeholder="Search" class="input input-bordered w-24 md:w-auto" />
            <button class="btn btn-primary">search</button>
        </div>
    </header>

    <main class="bg-[#F8FAFC] max-w-[80%] mx-auto">

        <section id="" class="p-6 flex gap-2 bg-white mb-4 rounded-lg mt-12 shadow-md">
            <button onclick="" id="" class="btn  w-[120px] h-10"> All </button>
            <button onclick="" id="" class="btn  w-[120px] h-10"> Open </button>
            <button onclick="" id="" class="btn  w-[120px] h-10"> Close</button>
        </section>

        <section id="" class="">
            <div class="p-6 flex justify-between items-center bg-white rounded-lg shadow-md mb-2">
                <div class="flex gap-2 items-center">
                    <div class="w-[50px] h-[50px] rounded-full bg-[#ECE4FF] flex items-center justify-center">
                        <img class="w-8 h-8" src="./assets/Aperture.png" alt="" />
                    </div>
                    <div>
                        <h3 class="mb-[3px] font-semibold text-xl"><span id="total-count">50</span> Issues</h3>
                        <p>Track and manage your project issues</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <div id="open-badge" class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-[#00A96E]"></div>
                        <p>Open</p>
                    </div>
                    <div id="closed-badge" class="flex items-center gap-2">
                        <div class="rounded-full w-3 h-3 bg-[#A855F7]"></div>
                        <p>Closed</p>
                    </div>
                </div>
            </div>
            
            <!-- <div id="spinner" class="hidden">
                <section class="flex justify-center items-center min-h-screen">
                    <span class="loading loading-spinner loading-xl text-primary"></span>
                </section>
            </div> -->

            <div id="card-container"
                class="bg-[#FBFBFB] p-6 mb-[60px] grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                
            </div>

        </section>

    </main>

</body>

</html>
